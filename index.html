<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <a href="#" class="logo">我的主页</a>
    <ul class="nav-list">
      <li><a href="#home">首页</a></li>
      <li><a href="#blog">我的博客</a></li>
      <li><a href="#weather">苏州天气</a></li>
      <li><a href="#bilibili">B站播放</a></li>
      <li><a href="#message">留言板</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </nav>

  <!-- 首页头部 -->
  <div class="hero" id="home">
    <h1>欢迎来到我的主页</h1>
  </div>

  <!-- 我的博客 -->
  <div class="card" id="blog">
    <div class="title">📝 我的博客</div>
    <div class="blog-container" id="blogList"></div>
  </div>

  <!-- 苏州天气 -->
  <div class="card text-center" id="weather"></div>

  <!-- B站播放器 -->
  <div class="card" id="bilibili"></div>

  <!-- 留言板 -->
  <div class="card" id="message"></div>

  <!-- 底部版权 -->
  <div class="footer">
    <p>Copyright © 我的个人主页 | 访问次数：<span id="visitCount">0</span></p>
  </div>

  <!-- 引入所有JS功能 -->
  <script type="module" src="script.js"></script>
</body>
</html>
