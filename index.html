<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 粒子背景 -->
<canvas id="particleCanvas"></canvas>

<!-- 右侧时钟 -->
<div class="clock-card">
  <div id="timeText">00:00:00</div>
  <div id="dateText">加载日期中...</div>
</div>

<!-- 顶部个人信息 -->
<div class="profile-container">
  <div class="avatar"></div>
  <h1 class="name">HI, I'M LELEO</h1>
  <p class="motto">如果你看到了这行字，说明我已经成功吸引到了你的注意力。</p>
  <div class="tags">
    <span>乐观开朗</span>
    <span>温柔体贴</span>
    <span>随和亲切</span>
    <span>才思敏捷</span>
    <span>风趣幽默</span>
  </div>
</div>

<!-- 功能卡片导航 -->
<div class="card-grid">
  <div class="nav-card">
    <div class="card-icon"><i class="fas fa-book"></i></div>
    <h3>博客</h3>
    <p>写不了一点</p>
    <button onclick="goSection('#blog')">前往</button>
  </div>

  <div class="nav-card">
    <div class="card-icon"><i class="fas fa-cloud"></i></div>
    <h3>天气</h3>
    <p>实时天气查询</p>
    <button onclick="goSection('#weather')">前往</button>
  </div>

  <div class="nav-card">
    <div class="card-icon"><i class="fas fa-comment"></i></div>
    <h3>留言板</h3>
    <p>留下你的足迹</p>
    <button onclick="goSection('#message')">前往</button>
  </div>

  <div class="nav-card">
    <div class="card-icon"><i class="fas fa-video"></i></div>
    <h3>视频</h3>
    <p>B站视频播放</p>
    <button onclick="goSection('#video')">前往</button>
  </div>
</div>

<!-- 内容区域 -->
<div class="sections">
  <section id="blog"><h2>博客</h2><p>即将上线...</p></section>
  <section id="weather" class="weather-section">
  <h2>🌤 实时天气</h2>
  <div class="weather-card" id="weatherCard">
    <p>加载中...</p>
  </div>
</section>
  <section id="message"><h2>留言板</h2><p>留言板功能加载中...</p></section>
  <section id="video"><h2>视频播放</h2><p>视频模块加载中...</p></section>
</div>

<script src="script.js"></script>
</body>
</html>
