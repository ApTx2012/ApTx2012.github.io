<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- 酷炫视觉增强 -->
<style>
/* 全局顺滑滚动 */
html {
  scroll-behavior: smooth;
}

/* 页面渐入动画 */
body {
  opacity: 0;
  animation: pageFade 1s ease-in-out forwards;
}
@keyframes pageFade {
  to { opacity: 1; }
}

/* 卡片悬浮动效 */
.suzhou-weather,
.bilibili-player,
.message-board,
.blog-entry {
  transition: all 0.3s ease;
}
.suzhou-weather:hover,
.bilibili-player:hover,
.message-board:hover,
.blog-entry:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0, 119, 255, 0.15);
}

/* 按钮流光效果 */
button {
  position: relative;
  overflow: hidden;
}
button::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.6s;
}
button:hover::after {
  left: 100%;
}
</style>

<!-- 鼠标跟随粒子 -->
<script>
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:999';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
window.addEventListener('mousemove', e => {
  particles.push({
    x: e.x, y: e.y,
    size: Math.random() * 2 + 1,
    opacity: 1,
    speedX: (Math.random() - 0.5) * 2,
    speedY: (Math.random() - 0.5) * 2
  });
});

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p => p.opacity > 0);
  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.opacity -= 0.02;
    ctx.fillStyle = `rgba(0, 119, 255, ${p.opacity})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
<body>

    </div>
  </nav>

  <div class="container">

    </header>

    <section class="about">

      <p>害怕智商令大家智熄</p>
    </section>

    <section class="links">

      <div class="link-buttons">
        <a href="https://github.com/ApTx2012" target="_blank">GitHub</a>
        <a href="mailto:3045929398@qq.com">Email</a>
      </div>

    <section class="blog-entry">

    <footer>

  <script type="module" src="script.js"></script>
</body>
</html>
